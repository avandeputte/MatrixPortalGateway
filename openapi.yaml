openapi: 3.1.0
info:
  title: Matrix Portal Gateway API
  version: "3.1"
  description: |
    REST API for the **Matrix Portal Gateway** firmware, running on a
    Waveshare ESP32-S3-RGB-Matrix driver board. It emulates a wall of split-flap modules on a
    HUB75 LED matrix and speaks the Split-Flap Gateway's API, so existing clients work unchanged.

    **Firmware 2.0 changed the target board, not the API.** Versions up to 1.25.0 ran on the
    Adafruit MatrixPortal S3 (that final build lives on the `matrixportal` git branch); the port
    is hardware-only, so every endpoint, schema and behaviour documented here is identical on
    both boards.

    **The `version` above is the gateway API level (3.1), not the firmware's version.** That is
    deliberate: the companion app gates its features on reading `>= 3.1` from `GET /api/config`,
    so this firmware answers `3.1.0` there and reports its own firmware version (currently
    `2.0.0`) in `fwVersion`, next to `product`. See ARCHITECTURE.md → "Firmware identity vs
    API level".

    Endpoints for calibration and provisioning are absent by design — this product's modules are
    *drawn*, not driven, so there is nothing to calibrate.

    **Base URL:** `http://<gateway-ip>` — replace with the gateway's IP
    (shown on the Status page), or use `http://192.168.4.1` when connected to
    the AP fallback network.

    JSON endpoints accept and return `application/json`. The canvas frame/rect/qoi/anim
    uploads, the companion settings blob and the OTA upload carry binary bodies instead.
    All endpoints include `Access-Control-Allow-Origin: *`.

servers:
  - url: http://192.168.4.1
    description: AP fallback (default)
  - url: http://{ip}
    description: Station IP (after WiFi connect)
    variables:
      ip:
        default: "192.168.1.100"
        description: Gateway IP address

tags:
  - name: Frames
    description: Raw protocol-frame access to the virtual modules
  - name: Modules
    description: Split-flap module display control
  - name: Display
    description: The visual state of the wall
  - name: Canvas
    description: Raw pixel control of the LED panel (Matrix only) — bypasses the split-flap wall
  - name: Status
    description: System status and diagnostics
  - name: Config
    description: Persistent configuration
  - name: Companion
    description: Companion-app registration and its settings blob store
  - name: OTA
    description: Over-the-air firmware update
  - name: UI
    description: Assets the dashboard (and the companion's proxy) fetch from the firmware image

paths:

  # ── Protocol frames ─────────────────────────────────────────────

  /api/log:
    get:
      tags: [Frames]
      summary: Drain the command log
      description: >-
        Returns the commands received (REST and MQTT) since the last call, up to 64, then
        advances the cursor. On this firmware there is no physical wire, so this is a log of
        commands the gateway acted on, not an RX/TX wire trace. Each call drains what is new.
      responses:
        "200":
          description: Array of log entries (may be empty)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogEntry"

  /api/frames/send:
    post:
      tags: [Frames]
      summary: Send a raw ASCII protocol frame to the virtual modules
      description: >-
        The only send path since v1.22.0: the physical gateway's `/api/rs485/send`
        (kept as a compatibility alias through v1.21) and the interim `/api/bus/send`
        were removed in v1.22.0 and now 404.

        Frames are **one-way** (v1.24.0): the modules act on `-` (show character), `+`
        (show index) and `h` (home), silently ignore everything else, and nothing ever
        replies — the `v`/`A` queries were removed. The MQTT mirror carries only the
        outbound wire (`<prefix>/frames/tx`). Read the wall back through
        `/api/display/state`, `/api/flap/modules` and `/api/capabilities`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: string
                  description: >
                    ASCII frame to transmit. A trailing newline is optional — the
                    gateway normalizes framing (adds/strips the terminator and trims
                    any bytes past a complete known command) unless `raw` is true.
                raw:
                  type: boolean
                  default: false
                  description: >
                    When true, the bytes in `data` are sent verbatim with no
                    sanitization or terminator changes (debugging escape hatch).
            examples:
              home_all:
                value: { data: "m*h" }
              show_char:
                value: { data: "m5-A" }
              show_index:
                value: { data: "m5+223" }
              raw_verbatim:
                value: { data: "m5-A\n", raw: true }
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/frames/batch:
    post:
      tags: [Frames]
      summary: Send many raw frames in one request (v3.0)
      description: >
        Sends each frame in `frames`, normalized like `/api/frames/send`, so a host can draw a
        whole animated page in one HTTP call instead of one request per module. Capped at 512
        frames. An optional `step_ms` paces the cascade: the request returns immediately and the
        frames are delivered on a schedule by the frames task (so a paced batch never blocks the
        web server). `step_ms` 0 sends everything at once. The only batch path since v1.22.0:
        `/api/rs485/batch` and the interim `/api/bus/batch` were removed in v1.22.0 and now 404.
        Like `/api/frames/send`, frames are one-way (v1.24.0) — nothing replies, and the MQTT
        mirror carries only `<prefix>/frames/tx`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [frames]
              properties:
                frames:
                  type: array
                  items: { type: string }
                  description: ASCII frames, e.g. ["m00-A\n","m01-B\n"]
                step_ms:
                  type: integer
                  default: 0
                  description: Delay (0–30 ms) between frames, for a paced cascade.
            example: { frames: ["m00-A\n", "m01-B\n", "m02-y\n"], step_ms: 15 }
      responses:
        "200":
          description: How many frames were sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:   { type: boolean, example: true }
                  sent: { type: integer, example: 45 }
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── Module display control ──────────────────────────────────────

  /api/display/state:
    get:
      tags: [Display]
      summary: Current visual state of the split-flap wall
      description: |
        Returns the configured grid dimensions and the character shown in each
        cell. Cells map to module IDs left-to-right, top-to-bottom (cell index =
        row*cols + col == module id). Drives the Live Display.

        Each cell is the character the module is actually showing, read straight
        from the module (there is no tracking layer to go stale). Lowercase,
        accents and pictographs are reported as themselves — the cell carries a
        Unicode code point, not a Windows-1252 byte, so a heart reads back as "♥".
        A colour flap has no character and reports as its protocol letter
        (r o y g b p w). null means no module has that id — only possible if the
        panel clamped the grid.
      responses:
        "200":
          description: Display state
          content:
            application/json:
              schema:
                type: object
                properties:
                  rows:  { type: integer, example: 3 }
                  cols:  { type: integer, example: 15 }
                  cells:
                    type: array
                    items: { type: [string, "null"] }
                    example: [" ","1","2",":","0","4","A","M",null,null]

  /api/display/cells:
    post:
      tags: [Display]
      summary: Set the wall by flap INDEX — lowercase, pictographs, named colours (v1.6)
      description: |
        The index-addressed display API. It exists because two things are **impossible** on
        the legacy character protocol, and no amount of care fixes either:

        * **Lowercase.** `m<id>-<char>` carries one byte, and the byte for `r` already means
          **red** — the seven colour flaps are addressed by `r o y g b p w`, by protocol. So
          on that path a lowercase letter must fold to uppercase, or the colours break. You
          cannot have both on one byte.
        * **Pictographs.** A heart has no Windows-1252 byte at all, so there is no byte to
          send.

        Both flaps *exist* on the reel (163–222 lowercase, 223–236 pictographs). They are
        simply unreachable by character. This endpoint addresses them **by index** — the
        ordinary `m<id>+<n>` command, which the modules have always understood — and names
        colours explicitly instead of stealing letters for them.

        The legacy endpoints are untouched and still work exactly as before.

        Every cell is resolved **before anything is sent**. A character with no flap is a
        `400`, not a silent blank: a half-written wall is worse than a rejected request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cells]
              properties:
                start:
                  type: integer
                  default: 0
                  description: First module id the cells land on.
                step_ms:
                  type: integer
                  default: 0
                  description: >
                    0–30 ms between cells, for a paced cascade. Scheduled, never a delay()
                    — the request returns immediately.
                cells:
                  type: array
                  description: One entry per module, left to right. Exactly one key each.
                  items:
                    type: object
                    properties:
                      ch:
                        type: string
                        description: >
                          One character, UTF-8. Lowercase and accents are kept as typed.
                          A pictograph goes here as itself.
                      color:
                        type: string
                        enum: [red, orange, yellow, green, blue, purple, white]
                        description: A colour flap, NAMED. On this path `r` is the letter r.
                      blank:
                        type: boolean
                        description: Home the module (flap 0).
                      skip:
                        type: boolean
                        description: Leave that module exactly as it is.
            example:
              start: 0
              step_ms: 15
              cells:
                - { ch: "H" }
                - { ch: "e" }
                - { ch: "l" }
                - { ch: "l" }
                - { ch: "o" }
                - { ch: "♥" }
                - { color: "red" }
                - { blank: true }
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:    { type: boolean, example: true }
                  cells: { type: integer, example: 8 }
                  sent:  { type: integer, example: 7, description: "cells actually transmitted (skips are not)" }
        "400":
          description: >
            Bad request — including a character the reel cannot show
            ("no flap for U+1F600") or an unknown colour name.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/canvas:
    get:
      tags: [Canvas]
      summary: Raw-canvas state and panel size (v1.13)
      description: |
        The raw-canvas API is unique to the Matrix gateway: it hands you the HUB75 panel as a
        plain framebuffer, bypassing the split-flap wall entirely. While a canvas is **active**
        the reel renderer stands down (the same way it does during an OTA) and these endpoints
        own every pixel; releasing it repaints the wall from the modules' current state. Nothing
        is persisted — a reboot returns to the wall.

        This GET reports whether a canvas is active, the panel dimensions (so a client can size
        the frames it pushes), which on-device `effect` (if any) is currently running, and
        whether an uploaded animation (`anim`) or a ticker is playing.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  active:  { type: boolean, example: false }
                  width:   { type: integer, example: 128 }
                  height:  { type: integer, example: 32 }
                  formats: { type: array, items: { type: string }, example: [rgb888, rgb565, qoi] }
                  effect:  { type: string, example: none, description: Running on-device effect, or "none". }
                  anim:    { type: boolean, example: false, description: An uploaded animation is playing. }
                  ticker:  { type: boolean, example: false, description: A ticker is scrolling. }
                  effects: { type: array, items: { type: string }, example: [plasma, fire, matrix, fliporama, clock, life] }
    post:
      tags: [Canvas]
      summary: Take over the panel, or release it back to the wall (v1.13)
      description: |
        `{"active": true}` blanks the panel and stands the reel renderer down so the canvas
        endpoints own it. `{"active": false}` returns to the split-flap wall. Pushing a frame or
        ops also takes over automatically, so this is only needed to blank-and-hold, or to release.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                active: { type: boolean }
            example: { active: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:     { type: boolean, example: true }
                  active: { type: boolean, example: true }

  /api/canvas/frame:
    get:
      tags: [Canvas]
      summary: Read the live panel back as raw pixels (v1.20)
      description: |
        A screenshot of whatever is on screen — wall, effect, canvas, animation or ticker —
        reconstructed from the framebuffer and quantised to the panel's bit depth. Read-only:
        it never takes the panel over. The body is raw pixels, **width × height**, row-major,
        top-left origin, in the format chosen by `?fmt=` (rgb888 unless `rgb565` is asked for);
        the dimensions and format are echoed in the `X-Canvas-*` headers so a client need not
        have called `GET /api/canvas` first.
      parameters:
        - name: fmt
          in: query
          required: false
          schema: { type: string, enum: [rgb888, rgb565], default: rgb888 }
          description: Pixel format of the returned bytes. Anything other than `rgb565` means rgb888.
      responses:
        "200":
          description: Raw pixel bytes (width × height × 3 for rgb888, × 2 for rgb565 big-endian)
          headers:
            X-Canvas-Width:
              schema: { type: integer }
              description: Panel width in pixels
            X-Canvas-Height:
              schema: { type: integer }
              description: Panel height in pixels
            X-Canvas-Format:
              schema: { type: string, enum: [rgb888, rgb565] }
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "503":
          description: Panel not running (the gateway is headless), or the readback buffer could not be allocated
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "507":
          description: Internal heap is low — streaming a screenshot now could destabilise the gateway; retry shortly
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    put:
      tags: [Canvas]
      summary: Blit a full raw frame — draw anything (v1.13)
      description: |
        A complete frame as raw pixel bytes: **width × height** pixels, row-major, top-left
        origin. Render whatever you like on the client and push the pixels. Auto-takes-over the
        panel. The body is streamed straight to the back buffer, so no multi-KB frame is buffered
        whole.

        The **pixel format is inferred from the body length** — a full frame is unambiguously one
        of these, so nothing else has to be signalled:

        * `width × height × 3` bytes → **rgb888**, `R G B` per pixel.
        * `width × height × 2` bytes → **rgb565**, big-endian (high byte first).

        Any other length is a `400`. The `fmt` query arg is accepted as a hint but ignored by the
        firmware (a raw-body handler cannot read URL args); the length is authoritative. Get the
        dimensions from `GET /api/canvas`. rgb565 halves the upload — worth it for animation, and
        the panel's colour depth loses nothing.
      parameters:
        - name: fmt
          in: query
          required: false
          schema: { type: string, enum: [rgb888, rgb565] }
          description: Optional hint; the actual format is inferred from the body length.
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        "200":
          description: Frame presented
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:     { type: boolean, example: true }
                  width:  { type: integer, example: 128 }
                  height: { type: integer, example: 32 }
                  pixels: { type: integer, example: 4096 }
        "400":
          description: Body length is neither width×height×3 (rgb888) nor width×height×2 (rgb565)
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "503":
          description: Panel not running (the gateway is headless)
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  /api/canvas/rect:
    put:
      tags: [Canvas]
      summary: Update one rectangle without resending the whole panel (v1.18)
      description: |
        A partial update, drawn **on top of what is on screen** — the back buffer is synced to
        the live frame first, so everything outside the rectangle is untouched. Auto-takes-over
        the panel.

        The body is an **8-byte big-endian header** — `x`, `y`, `w`, `h`, one unsigned 16-bit
        each — followed by `w × h` pixels, row-major. As with `PUT /api/canvas/frame` the pixel
        format follows from the remaining body length: `w × h × 3` is rgb888, `w × h × 2` is
        rgb565 big-endian. Off-panel pixels are dropped, not clamped.
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        "200":
          description: Rectangle presented
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  x:  { type: integer, example: 10 }
                  y:  { type: integer, example: 4 }
                  w:  { type: integer, example: 32 }
                  h:  { type: integer, example: 16 }
        "400":
          description: Malformed body — missing/short header, w or h of 0, or a body that is not w×h×3 or w×h×2 pixels
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "503":
          description: Panel not running (the gateway is headless)
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  /api/canvas/qoi:
    put:
      tags: [Canvas]
      summary: Blit a full-panel QOI image (v1.18)
      description: |
        A complete frame as a [QOI](https://qoiformat.org) image — typically 3–10× smaller than
        raw rgb888, decoded on-device in one pass. The image's width and height **must equal the
        panel's** (from `GET /api/canvas`); alpha is ignored. Auto-takes-over the panel. The
        compressed body is buffered whole (in PSRAM when available) before decoding.
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        "200":
          description: Frame presented
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:     { type: boolean, example: true }
                  width:  { type: integer, example: 128 }
                  height: { type: integer, example: 32 }
        "400":
          description: Not a QOI image, or its dimensions do not match the panel
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "503":
          description: Panel not running, or the decode buffer could not be allocated
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "507":
          description: Internal heap is low — the upload is refused rather than risking a reboot; retry shortly
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  /api/canvas/anim:
    put:
      tags: [Canvas]
      summary: Upload a looping animation that plays on-device (v1.18)
      description: |
        A short loop of full-panel frames, streamed into PSRAM and played back by the gateway at
        a set fps — the client can disconnect and the animation keeps running until something
        else takes the panel (or a reboot returns to the wall).

        The body is a **14-byte big-endian header** followed by the frame data:

        | Offset | Size | Field |
        |---|---|---|
        | 0 | 4 | Magic `MPGA` |
        | 4 | 1 | Version, must be `1` |
        | 5 | 1 | Pixel format: `2` = rgb565 (big-endian), `3` = rgb888 |
        | 6 | 1 | Playback fps |
        | 7 | 1 | Flags: bit 0 = loop |
        | 8 | 2 | Frame width (must equal the panel's) |
        | 10 | 2 | Frame height (must equal the panel's) |
        | 12 | 2 | Frame count |

        …then `frames × w × h × bpp` bytes of frame data, frame after frame, row-major.
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        "200":
          description: Animation stored and playing
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:     { type: boolean, example: true }
                  frames: { type: integer, example: 24, description: "Frames loaded" }
        "400":
          description: Bad MPGA header (magic/version/dimensions) or truncated upload
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "413":
          description: Animation exceeds the PSRAM budget
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "503":
          description: Panel not running, or the frame store could not be allocated
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "507":
          description: Internal heap is low — the upload is refused rather than risking a reboot; retry shortly
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  /api/canvas/ticker:
    post:
      tags: [Canvas]
      summary: Scroll one line of text across the panel, rendered on-device (v1.18)
      description: |
        A right-to-left ticker the gateway renders itself — set it once and disconnect. Takes
        the panel over like an effect; an **empty `text` stops the ticker** and hands the panel
        back to the split-flap wall (allowed even during Quiet Time — starting one is not).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:  { type: string, description: "The line to scroll. Empty stops the ticker." }
                color:
                  type: array
                  items: { type: integer, minimum: 0, maximum: 255 }
                  minItems: 3
                  maxItems: 3
                  description: "[r, g, b], default white"
                speed: { type: integer, minimum: 1, maximum: 20, default: 2 }
            example: { text: "HELLO WORLD", color: [255, 200, 0], speed: 3 }
      responses:
        "200":
          description: Ticker started (or stopped, for empty text)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:     { type: boolean, example: true }
                  active: { type: boolean, example: true }
        "400":
          description: Invalid JSON
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "409":
          description: Quiet Time is active — the panel must stay dark
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "503":
          description: Panel not running (the gateway is headless)
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  /api/canvas/ops:
    post:
      tags: [Canvas]
      summary: Draw commands — shapes, gradients, sprites, text, scroll (v1.13; 11 ops added v1.25)
      description: |
        A JSON **array** of drawing ops, applied in order, then the frame is presented. Handy for
        shapes and labels without composing a whole frame client-side. Auto-takes-over the panel.
        Colours are `[r, g, b]` (0–255), defaulting to white — black for `clear`. Off-panel pixels
        are dropped. Unknown ops are skipped. The advertised op list is `capabilities.canvas.ops`.

        Ops (everything marked *(v1.25)* was added then):
        * `{"op":"clear"}` or `{"op":"clear","color":[r,g,b]}` — fill the whole panel
        * `{"op":"pixel","x":,"y":,"color":[…]}`
        * `{"op":"hline","x":,"y":,"w":,"color":[…]}` / `{"op":"vline","x":,"y":,"h":,"color":[…]}`
        * `{"op":"line","x":,"y":,"x1":,"y1":,"color":[…]}` — an arbitrary (Bresenham) line *(v1.25)*
        * `{"op":"rect","x":,"y":,"w":,"h":,"color":[…],"fill":true|false}`
        * `{"op":"circle","x":cx,"y":cy,"r":radius,"color":[…],"fill":true|false}` — outline or disc *(v1.25)*
        * `{"op":"ellipse","x":cx,"y":cy,"rx":,"ry":,"color":[…],"fill":true|false}` — axis-aligned ellipse *(v1.25)*
        * `{"op":"triangle","x":,"y":,"x1":,"y1":,"x2":,"y2":,"color":[…],"fill":true|false}` — three vertices *(v1.25)*
        * `{"op":"roundrect","x":,"y":,"w":,"h":,"r":radius,"color":[…],"fill":true|false}` — rounded rect *(v1.25)*
        * `{"op":"gradient","x":,"y":,"w":,"h":,"from":[…],"to":[…],"dir":"v"|"h"}` — a linear-gradient fill (`dir` default `v`) *(v1.25)*
        * `{"op":"polyline","points":[[x,y],…],"color":[…]}` — connect the points with lines *(v1.25)*
        * `{"op":"text","x":,"y":,"s":"HELLO","color":[…],"size":10,"align":"left"|"center"|"right"}` —
          built-in CP1252 font; `size` picks a bundled face height (8, 9, 10, 13, 18, 20), default 10;
          `align` places the string relative to `x` (default `left`) *(align v1.25)*
        * `{"op":"image","x":,"y":,"w":,"h":,"fmt":"rgb888"|"rgb565","data":"<base64>"}` — blit a small
          base64 sprite (≤ 8 KB decoded; use `PUT /api/canvas/frame` for a full panel) *(v1.25)*
        * `{"op":"scroll","dx":,"dy":,"color":[…]}` — shift the current frame by (dx, dy), filling the
          vacated pixels with `color` (black by default). Make it the batch's first op, then draw the
          newly-revealed edge — a marquee without resending the whole panel *(v1.25)*
        * `{"op":"show"}` — present mid-batch (otherwise presented once at the end)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { type: object }
            example:
              - { op: clear }
              - { op: rect, x: 0, y: 0, w: 128, h: 32, color: [0, 40, 80], fill: true }
              - { op: text, x: 4, y: 2, s: "HELLO", color: [255, 255, 0], size: 13 }
              - { op: pixel, x: 100, y: 20, color: [255, 0, 0] }
      responses:
        "200":
          description: Applied and presented
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:      { type: boolean, example: true }
                  applied: { type: integer, example: 4 }
        "400":
          description: Body is not a JSON array
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "503":
          description: Panel not running (the gateway is headless)
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  /api/canvas/effect:
    post:
      tags: [Canvas]
      summary: Run an on-device animated effect (v1.14)
      description: |
        Start an animation that the **gateway renders itself**, on the display task, at the panel's
        native frame rate (~70 fps) — no client and nothing on the network. This is the smooth way
        to animate: pushing frames over HTTP tops out near 8 fps (one TCP connection per frame),
        while an on-device effect is limited only by the panel.

        An effect supersedes raw-canvas mode and owns the panel until you stop it. `{"type":"none"}`
        (or `POST /api/canvas {"active":false}`) hands the panel back to the split-flap wall.

        * `plasma` — flowing rainbow sine-interference field.
        * `fire` — bottom-up flames through a black→red→orange→yellow→white palette.
        * `matrix` — falling green streaks with bright heads and fading trails.
        * `fliporama` — the whole board flips random glyphs, like a live departure board.
        * `clock` — a digital clock: big anti-aliased HH:MM (JetBrains Mono) in a drifting rainbow,
          with the date and seconds; uses the gateway's configured timezone.
        * `life` — Conway's Game of Life, cells coloured by age, reseeded when it settles.

        `speed` is `1`–`10` (default keeps the current value). `hue` and `density` (v1.19) are
        optional per-start overrides of the effect's look; leaving either out keeps the effect's
        own default. Nothing is persisted — a reboot returns to the wall.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:    { type: string, enum: [plasma, fire, matrix, fliporama, clock, life, none] }
                speed:   { type: integer, minimum: 1, maximum: 10 }
                hue:     { type: integer, minimum: 0, maximum: 255, description: "Base hue override (0–255 colour wheel). Omit to keep the effect's own palette." }
                density: { type: integer, minimum: 1, maximum: 100, description: "Density override (1–100), e.g. streak count or seeding. Omit for the effect default." }
            example: { type: plasma, speed: 4, hue: 96 }
      responses:
        "200":
          description: Effect set (or stopped)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:      { type: boolean, example: true }
                  effect:  { type: string, example: plasma }
                  speed:   { type: integer, example: 4 }
                  hue:     { type: integer, example: 96, description: "-1 when no override is set" }
                  density: { type: integer, example: -1, description: "-1 when no override is set" }
        "400":
          description: Invalid JSON
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "409":
          description: Quiet Time is active — starting an effect is refused so the panel stays dark ("none" is still allowed)
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "503":
          description: Panel not running (the gateway is headless)
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  /api/flap/modules:
    get:
      tags: [Modules]
      summary: List the wall's modules
      description: |
        Every module on the wall, in id order. On this firmware the wall is drawn
        rather than discovered, so this is not a registry of "what has answered":
        one module exists per grid cell, always, and this reports their live state.
        The count is always gridRows x gridCols.
      responses:
        "200":
          description: Array of module objects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Module"

  /api/flap/char:
    post:
      tags: [Modules]
      summary: Show a character on a module
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, char]
              properties:
                id:
                  type: integer
                  description: Module ID (0–254), or -1 to broadcast to all
                char:
                  type: string
                  description: >
                    A single character (UTF-8). The gateway uppercases ASCII
                    letters — except the seven lowercase colour codes r/o/y/g/b/p/w,
                    which address the colour flaps and are sent as-is — and transcodes
                    the character to a single Windows-1252 byte (so € and accented
                    letters work), then sends m<id>-<char>; the module firmware maps
                    the byte to a flap index. Characters with no Windows-1252
                    representation are rejected.
            example: { id: 5, char: "A" }
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/flap/index:
    post:
      tags: [Modules]
      summary: Show a flap by index
      description: >-
        Sends the ordinary `m<id>+<n>` command — the same one `/api/display/cells` uses. The
        whole 237-flap drawn reel is addressable, including the lowercase (163–222) and
        pictograph (223–236) sections that the character path cannot reach.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, index]
              properties:
                id:
                  type: integer
                  description: Module ID, or -1 to broadcast to all
                index:
                  type: integer
                  minimum: 0
                  maximum: 236
                  description: Flap index on the reel. 0 is blank.
            example: { id: 5, index: 1 }
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/flap/text:
    post:
      tags: [Modules]
      summary: Send a text string across sequential modules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text, start]
              properties:
                text:
                  type: string
                start:
                  type: integer
                  description: ID of the first module
            example: { text: "HELLO", start: 0 }
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  chars: { type: integer }
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/flap/home:
    post:
      tags: [Modules]
      summary: Home one or all modules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: integer
                  description: Module ID, or -1 to home all
            examples:
              single: { value: { id: 5 } }
              all:    { value: { id: -1 } }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/capabilities:
    get:
      tags: [Status]
      summary: What this wall can actually show
      description: |
        One call, made once when a client connects, that answers "what characters can this
        display show?" without the client having to know which gateway it is talking to. The
        Split-Flap Gateway and the Matrix Portal Gateway answer this URL with the SAME shape.

        `charset.union` is every character SOME module can show ("can this wall show a Z
        anywhere?"). `charset.common` is every character EVERY module can show ("can I lay this
        text across arbitrary cells?"). On a real wall these can differ: if module 1 carries A-Z
        and module 2 carries 0-9, the union is A-Z0-9 and the common set is EMPTY -- the wall
        cannot show "HI42" wherever it likes, and only `common` says so. `uniform` is true when
        every module carries the same reel, which is always the case on the Matrix Portal (one
        drawn reel, rendered per cell).

        `sets` reports each DISTINCT reel once, with the ids that carry it ("0-44,50"), rather
        than one entry per module -- so a uniform wall is a few hundred bytes however large it
        is. The `chars` of a set is the reel VERBATIM, in flap-index order, because a client
        addressing a flap by index needs the positions rather than the alphabet.

        TWO TRANSLATIONS apply to the character sets, matching what the gateway does when it
        resolves a frame: the seven colour flaps (r o y g b p w) are reported under `colors` by
        name and kept OUT of the character sets, and 'q' -- which the classic reel borrows for
        the double-quote flap -- is reported as '"'.

        On the Split-Flap Gateway a module only reports its reel from firmware v31. `assumed`
        lists modules too old to report one, whose reel is taken to be the firmware's built-in
        default; `unknown` lists modules whose reel is genuinely not known yet (the background
        fill has not reached them, or they are unreachable) and which are excluded from both
        character sets. Both are always empty on the Matrix Portal -- its modules are drawn
        and share one reel.
      responses:
        "200":
          description: Wall capabilities
          content:
            application/json:
              schema:
                type: object
                properties:
                  product:  { type: string, example: "Matrix Portal Gateway" }
                  fw:       { type: string, example: "2.0.0" }
                  api:      { type: string, example: "3.1.0" }
                  grid:
                    type: object
                    properties:
                      rows: { type: integer, example: 3 }
                      cols: { type: integer, example: 15 }
                  modules:  { type: integer, description: "Provisioned modules on the wall", example: 45 }
                  maxFlaps: { type: integer, description: "Flaps a module can carry (64 real, 237 drawn)", example: 237 }
                  colors:
                    type: array
                    description: "The colour flaps the wall actually has, by name. A custom reel with no colour codes reports none."
                    items: { type: string }
                    example: ["red","orange","yellow","green","blue","purple","white"]
                  charset:
                    type: object
                    properties:
                      union:   { type: string, description: "Every character SOME module can show" }
                      common:  { type: string, description: "Every character EVERY module can show" }
                      uniform: { type: boolean, description: "true when every module carries the same reel" }
                      assumed:
                        type: array
                        description: "Module ids whose reel is the firmware default, assumed rather than reported (fw < 31)"
                        items: { type: integer }
                      unknown:
                        type: array
                        description: "Module ids whose reel is not known; excluded from union and common"
                        items: { type: integer }
                  sets:
                    type: array
                    description: "Each distinct reel once, with the ids that carry it"
                    items:
                      type: object
                      properties:
                        flaps:   { type: integer, example: 64 }
                        source:  { type: string, enum: [reported, assumed, builtin] }
                        chars:   { type: string, description: "The reel verbatim, in flap-index order" }
                        modules: { type: string, description: "Compressed id list", example: "0-44,50" }
                  motion:
                    type: object
                    description: >
                      How the wall MOVES, stated directly so a client never infers motion from
                      which endpoints exist. On this gateway `kind` is `drawn`: a cell is a
                      repaint, not a mechanism — a new value can retarget it mid-flip, nothing
                      queues, so sub-second updates are honest. The Split-Flap gateway answers
                      the same key with kind `mechanical`.
                    properties:
                      kind:     { type: string, enum: [drawn, mechanical], example: drawn }
                      settleMs: { type: integer, example: 3840, description: "Worst-case flip animation in ms (flapMs × flapMax, both live-configurable). Advisory here — cosmetic pacing, not a physical constraint." }
                  canvas:
                    type: object
                    description: >
                      Raw-framebuffer support — Matrix only; absent on the Split-Flap gateway,
                      which has no framebuffer. The panel a client can push frames to via
                      `PUT /api/canvas/frame` / `POST /api/canvas/ops`, with flags for the
                      partial-update, animation, ticker and readback endpoints.
                    properties:
                      formats:  { type: array, items: { type: string }, example: [rgb888, rgb565, qoi] }
                      width:    { type: integer, example: 128 }
                      height:   { type: integer, example: 64 }
                      rect:     { type: boolean, example: true, description: "`PUT /api/canvas/rect` partial updates" }
                      anim:     { type: boolean, example: true, description: "`PUT /api/canvas/anim` on-device animation" }
                      ticker:   { type: boolean, example: true, description: "`POST /api/canvas/ticker` scrolling text" }
                      readback: { type: boolean, example: true, description: "`GET /api/canvas/frame` screenshot readback" }
                  effects:
                    type: array
                    description: >
                      On-device animated effects the gateway renders itself — Matrix only; absent
                      on the Split-Flap gateway. Start one with `POST /api/canvas/effect`.
                    items: { type: string }
                    example: [plasma, fire, matrix, fliporama, clock, life]
                  effectParams:
                    type: array
                    description: "Optional per-start effect parameters `POST /api/canvas/effect` accepts beyond `speed`."
                    items: { type: string }
                    example: ["hue", "density"]
                  features:
                    type: array
                    description: "Capability tokens a client checks instead of sniffing the firmware version. 'canvas', 'effects' and 'ticker' appear on the Matrix gateway only."
                    items: { type: string }
                    example: ["cells","colors","index","lowercase","pictographs","quiet","ha","ota","canvas","effects","ticker"]

  /api/status:
    get:
      tags: [Status]
      summary: System status
      responses:
        "200":
          description: Current system status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  /api/mqtt/test:
    post:
      tags: [Status]
      summary: Test MQTT broker connectivity and credentials
      description: |
        Performs a TCP reachability check (3s cap) followed by a real MQTT
        CONNECT/CONNACK exchange using a throwaway client, without touching the
        gateway's live MQTT connection. Body fields are optional; omitted fields
        default to the saved configuration, so settings can be verified before
        saving.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                host: { type: string, example: "192.168.1.65" }
                port: { type: integer, example: 1883 }
                user: { type: string }
                pass: { type: string }
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:     { type: boolean, description: "true if MQTT CONNECT succeeded" }
                  tcp:    { type: boolean, description: "TCP connection succeeded" }
                  mqtt:   { type: boolean, description: "MQTT CONNECT/CONNACK succeeded" }
                  state:  { type: integer, description: "PubSubClient state code" }
                  detail: { type: string,  example: "bad username or password" }


  /api/quiet:
    get:
      tags: [Status]
      summary: Get quiet-time state
      responses:
        "200":
          description: Current state
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  on: { type: boolean, example: false }
    post:
      tags: [Status]
      summary: Enable or disable quiet time
      description: |
        **Enabling blanks the display.** Every reel is homed to its blank flap as quiet
        time is entered -- the same operation as Home All -- so the wall goes empty for
        the duration.

        While enabled, the gateway still accepts and acknowledges every command, but does
        not act on display-motion frames (show character, show index, home), so the wall
        stays dark. There are no calibration commands on this product — the modules are
        drawn, and any such frames are ignored. Starting an on-device effect or ticker is
        refused with `409` for the duration. Display tracking is left unchanged.

        **Disabling restores the display.** The reels resync to whatever each module was
        last asked to show while quiet -- or, if nothing was asked, to what it was showing
        when quiet time began.

        Always resets to off on reboot (not persisted). Also settable over MQTT
        (`<prefix>/quiet/set`) and from Home Assistant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [on]
              properties:
                on: { type: boolean }
            example: { on: true }
      responses:
        "200":
          description: New state
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  on: { type: boolean, example: true }

  /api/quiet/schedule:
    get:
      tags: [Status]
      summary: Get the daily quiet-time schedule (v3.0)
      responses:
        "200":
          description: Current schedule
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuietSchedule" }
    post:
      tags: [Status]
      summary: Set the daily quiet-time schedule (v3.0)
      description: |
        When enabled, quiet time is toggled automatically as local time crosses
        the window (overnight windows supported). Transition-based, so a manual
        toggle within a window is respected until the next boundary. Persisted.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QuietSchedule" }
            example: { enabled: true, start: "22:00", end: "07:00", days: 127 }
      responses:
        "200":
          description: New schedule
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QuietSchedule" }

  # ── Companion app ───────────────────────────────────────────────

  /api/companion:
    get:
      tags: [Companion]
      summary: Get the registered companion app (v3.0)
      responses:
        "200":
          description: Registered companion URL and its last reported status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Companion" }
    post:
      tags: [Companion]
      summary: Register the companion app and heartbeat its status (v3.0)
      description: |
        The companion app posts its own URL here so the gateway can show a
        **Companion** tab linking back to it. The URL is persisted in NVS (and
        only rewritten when it actually changes, to spare the flash from
        heartbeats); the status is runtime-only and clears on reboot.

        An empty `url` deregisters the companion. Either field may be sent alone.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Companion" }
            example: { url: "http://192.168.1.60:8000", status: "Running: Weather" }
      responses:
        "200":
          description: The stored registration after the update
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Companion" }

  /api/companion/settings:
    get:
      tags: [Companion]
      summary: Fetch the companion's stored settings blob (v3.1)
      description: |
        Returns the blob exactly as it was stored by `PUT`, byte for byte.

        The body is `gzip(minified JSON)` whose schema belongs entirely to the
        companion — the gateway never parses it. It is served as
        `application/gzip` and **not** with `Content-Encoding: gzip`: these bytes
        are the payload, not a transfer encoding of it, so HTTP clients must not
        transparently decompress them. The caller decompresses it itself.
      responses:
        "200":
          description: The stored gzipped JSON blob
          content:
            application/gzip:
              schema: { type: string, format: binary }
        "404":
          description: Nothing stored yet (or the filesystem is unavailable)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    put:
      tags: [Companion]
      summary: Store the companion's settings blob (v3.1)
      description: |
        Stores the request body **verbatim** and **atomically**: it streams to a
        temp file on the FATFS partition and is renamed over the live copy only
        once the final byte lands, so an interrupted upload can never corrupt
        settings that were already good. The blob survives OTA firmware updates.

        The body must be `gzip(minified JSON)`, at most 64 KB (real blobs are
        1–2 KB). The gateway stores whatever bytes it is given and does not
        validate that they are valid gzip or valid JSON.
      requestBody:
        required: true
        content:
          application/gzip:
            schema: { type: string, format: binary }
      responses:
        "200":
          description: Stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:    { type: boolean, example: true }
                  bytes: { type: integer, description: "Bytes stored", example: 1284 }
        "400":
          description: Empty or truncated body — nothing was changed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "413":
          description: Blob larger than 64 KB — nothing was changed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "503":
          description: Filesystem not mounted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "507":
          description: Write failed (storage full or I/O error)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /lang/{code}:
    get:
      tags: [UI]
      summary: One UI translation dictionary (gzipped JSON)
      description: |
        Serves the dashboard's translation dictionary for `code` — a JSON object mapping the
        **English source text** to its translation, e.g. `{"Save Panel": "Panel speichern"}`.

        The dictionaries are baked into the firmware image, one gzipped blob per language, and
        the browser fetches only the one it is using. **English has no dictionary**: it is the
        text already in the page, and the per-key fallback for every other language, so a
        missing key degrades to English rather than breaking the page.

        `Content-Encoding: gzip` is a *transfer* encoding here — the browser inflates the body
        before `fetch().json()` ever sees it. (This is the opposite of
        `/api/companion/settings`, where the gzip **is** the payload and the header is
        deliberately not set.)

        Only the languages this firmware actually ships are routed; any other code 404s.
        `ETag` changes on every reflash, so a conditional GET normally costs a 304.

        The gateway stores **no** language preference. The dashboard resolves it in the browser:
        `?lang=` in the URL (a one-off view — not saved), then a Settings override in
        `localStorage`, then `navigator.languages`, then English.
      parameters:
        - name: code
          in: path
          required: true
          description: BCP-47 language tag, as advertised by the page's built-in language list.
          schema:
            type: string
            enum: [en-GB, en-AU, fr, de, es, it, pt, pt-BR, nl, da, sv, nb, fi]
          example: de
      responses:
        "200":
          description: The dictionary. Body is gzip-compressed JSON.
          headers:
            Content-Encoding:
              schema: { type: string, enum: [gzip] }
            ETag:
              schema: { type: string }
            Cache-Control:
              schema: { type: string, example: no-cache }
          content:
            application/json:
              schema:
                type: object
                additionalProperties: { type: string }
              example:
                Save Panel: Panel speichern
                Panel width (px): Panelbreite (px)
                Module Wall: Modulwand
        "304":
          description: Not modified (the client's `If-None-Match` matches the current build)
        "404":
          description: This firmware does not ship that language (English is never routed)

  /api/config:
    get:
      tags: [Config]
      summary: Get current configuration (passwords excluded)
      responses:
        "200":
          description: Current configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Config"

  /api/config/wifi:
    post:
      tags: [Config]
      summary: Save WiFi credentials and reconnect
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ssid, pass]
              properties:
                ssid: { type: string, example: "MyNetwork" }
                pass: { type: string, example: "mypassword" }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/config/mqtt:
    post:
      tags: [Config]
      summary: Save MQTT broker settings and reconnect
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [host, port, prefix]
              properties:
                host:   { type: string, example: "192.168.1.50" }
                port:   { type: integer, default: 1883 }
                user:   { type: string, example: "" }
                pass:   { type: string, example: "" }
                prefix: { type: string, default: "splitflap" }
            example: { host: "192.168.1.50", port: 1883, user: "", pass: "", prefix: "splitflap" }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/config/settings:
    post:
      tags: [Config]
      summary: Save any settings in one call
      description: |
        The one-call settings sink behind the dashboard's Settings page: send only the fields
        you want to change. Most take effect immediately (the exceptions say **Reboot to
        apply**). Three fields short-circuit — `otaPassword`, `serialDebug` and `haEnabled`
        each save and answer on their own, ignoring anything else in the same body — so send
        those alone. If WiFi credentials are in the payload the station reconnects after the
        response; if MQTT settings are, the broker connection is re-dialled.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ssid:        { type: string, example: "MyNetwork", description: "WiFi SSID. Saving triggers a reconnect." }
                pass:        { type: string, example: "mypassword", description: "WiFi password" }
                mqHost:      { type: string, example: "192.168.1.50", description: "MQTT broker host. Saving re-dials the broker." }
                mqPort:      { type: integer, example: 1883 }
                mqUser:      { type: string, example: "" }
                mqPass:      { type: string, example: "" }
                mqPfx:       { type: string, example: "splitflap", description: "MQTT topic prefix" }
                posixTZ:     { type: string, example: "EST5EDT,M3.2.0,M11.1.0" }
                ntpServer:   { type: string, example: "pool.ntp.org", description: "NTP server hostname; blank resets to pool.ntp.org" }
                gridRows:    { type: integer, minimum: 1, maximum: 64, example: 3,  description: "Display wall rows" }
                gridCols:    { type: integer, minimum: 1, maximum: 64, example: 15, description: "Display wall columns" }
                panelW:        { type: integer, example: 128, description: "Panel chain width in px. **Reboot to apply.**" }
                panelH:        { type: integer, enum: [16, 32, 64], example: 64, description: "Panel height in px. **Reboot to apply.**" }
                panelBitDepth: { type: integer, minimum: 1, maximum: 6, example: 4, description: "Bitplanes. RAM and refresh rate scale with it. **Reboot to apply.**" }
                panelBright:   { type: integer, minimum: 1, maximum: 255, example: 160, description: "Applies on the next frame." }
                panelBGR:
                  type: boolean
                  example: true
                  description: >
                    The panel is wired **BGR** rather than RGB — its own hardware colour order,
                    which the firmware cannot detect. On a BGR panel every colour is wrong in a
                    specific pattern: **red draws blue, blue draws orange, yellow draws cyan,
                    purple draws pink** — while **green and white look correct** (green is its own
                    channel, white is all three). That is why it hides: text is white.
                    Applies on the **next frame**, no reboot, so you can tick it and see the answer.
                flapMs:        { type: integer, minimum: 2, maximum: 500, example: 60, description: "ms per flap. Next flap." }
                flapMax:       { type: integer, minimum: 1, maximum: 64, example: 64, description: "Max flips per change. Next change." }
                hostname:      { type: string, example: "flapwall", description: "1–31 chars of a-z 0-9 '-' (lowercased for you). Empty string reverts to the MAC-derived name. **Reboot to apply.**" }
                haEnabled:   { type: boolean, example: true, description: "Enable Home Assistant MQTT auto-discovery and entity state topics. Short-circuits: send alone." }
                serialDebug: { type: boolean, example: true, description: "Short-circuits: send alone." }
                otaPassword: { type: string, example: "mysecret", description: "Short-circuits: send alone." }
            examples:
              timezone:
                value:
                  posixTZ: "EST5EDT,M3.2.0,M11.1.0"
              ntp_server:
                value:
                  ntpServer: "time.google.com"
              wifi:
                value:
                  ssid: "MyNetwork"
                  pass: "mypassword"
              mqtt:
                value:
                  mqHost: "192.168.1.50"
                  mqPort: 1883
                  mqPfx: "splitflap"
              panel:
                value:
                  panelW: 128
                  panelH: 32
                  panelBright: 160
              debug_on:
                value:
                  serialDebug: true
              home_assistant:
                value:
                  haEnabled: true
              ota_password:
                value:
                  otaPassword: "mysecret"
      responses:
        "200":
          description: Saved. `warn` appears when the requested wall does not fit the panel and will be reduced on reboot.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:   { type: boolean, example: true }
                  warn: { type: string, description: "Present only when the wall was clamped", example: "a 15x3 wall does not fit a 128x16 panel -- it will be reduced to 15x1 on reboot" }
        "400":
          description: Bad request — missing/malformed JSON, or an invalid hostname
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # ── OTA ─────────────────────────────────────────────────────────

  /ota:
    get:
      tags: [OTA]
      summary: Browser-based firmware upload page
      description: Returns an HTML page with a file picker for uploading a compiled `.bin` file.
      responses:
        "200":
          description: HTML upload page
          content:
            text/html:
              schema:
                type: string

  /api/ota/upload:
    post:
      tags: [OTA]
      summary: Upload compiled firmware binary
      description: |
        Accepts the compiled firmware as a `multipart/form-data` file part named
        `firmware` (this is what the `/ota` page submits). The gateway quiesces
        for the transfer, verifies the image, and reboots automatically on
        success; on failure it answers `500` and stays on the running firmware.
        Obtain the binary with a PlatformIO build (`pio run` → `firmware.bin`).
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [firmware]
              properties:
                firmware:
                  type: string
                  format: binary
                  description: The compiled firmware.bin
      responses:
        "200":
          description: Upload successful — gateway rebooting
          content:
            text/plain:
              schema:
                type: string
                example: "OK"
        "500":
          description: Update failed
          content:
            text/plain:
              schema:
                type: string

# ── Reusable components ──────────────────────────────────────────

components:
  responses:
    Ok:
      description: Success
      content:
        application/json:
          schema:
            type: object
            properties:
              ok:
                type: boolean
                example: true
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      description: The error body sent by a failing endpoint.
      properties:
        error: { type: string, example: "Settings blob too large" }

    Companion:
      type: object
      description: Companion-app registration (v3.0).
      properties:
        url:
          type: string
          description: "The companion's own base URL. Persisted; blank means no companion is registered. Posting a blank url deregisters it"
          example: "http://192.168.1.60:8000"
        status:
          type: string
          description: "The companion's last reported running status. Runtime-only -- clears on reboot. Quotes, backslashes and control characters are sanitised"
          example: "Running: Weather"

    QuietSchedule:
      type: object
      description: Daily quiet-time schedule (v3.0).
      properties:
        enabled: { type: boolean, example: true }
        start:   { type: string, description: "Window start HH:MM", example: "22:00" }
        end:     { type: string, description: "Window end HH:MM (overnight allowed)", example: "07:00" }
        days:    { type: integer, description: "Active-day bitmask, bit0=Sun … bit6=Sat", example: 127 }
        offset:  { type: integer, description: "Client UTC offset in minutes east of UTC; the window is evaluated in this local time. The web UI sends it on load.", example: -300 }
    LogEntry:
      type: object
      properties:
        ts:   { type: integer, description: "Milliseconds since boot", example: 12345 }
        ep:   { type: integer, description: "UTC epoch at capture (0 if RTC not set); UI renders in browser-local time", example: 1781210380 }
        wt:   { type: string,  description: "Gateway wall-clock timestamp", example: "2026-06-10 14:32:01" }
        src:  { type: string,  enum: [R, M], description: "Command source: R=REST, M=MQTT" }
        text: { type: string,  description: "The command, JSON-safe (control chars stripped, high CP1252 flap bytes shown as their real UTF-8 glyph)", example: "send m5-A" }

    Module:
      type: object
      description: >-
        One module row of `GET /api/flap/modules`. The `sn`, `provisioned` and `fwVersion`
        fields left in v1.24.0 along with the fake serial numbers and the `v`/`A` protocol
        queries they answered — no consumer existed.
      properties:
        id:          { type: integer, description: "Module ID == its position in the grid", example: 5 }
        flapIndex:   { type: integer, description: "The flap on show, 0..236. 0 is blank.", example: 1 }
        flapChar:    { type: string,  description: "The character on show, as a Unicode code point (so pictographs report as themselves). A colour flap reports as its protocol letter: r o y g b p w.", example: "A" }

    Status:
      type: object
      properties:
        uptime:    { type: integer, description: "Seconds since boot", example: 3842 }
        tx:        { type: integer, description: "Frames transmitted since boot. (`rx` left in v1.24.0 — nothing replies, so nothing is ever received.)", example: 37 }
        wifi:      { type: boolean, example: true }
        ip:        { type: string,  example: "192.168.1.105" }
        apip:      { type: string,  example: "192.168.4.1" }
        heap:      { type: integer, description: "Free heap bytes", example: 187432 }
        mqtt:      { type: boolean, example: true }
        modules:   { type: integer, example: 45 }
        time:      { type: string,  description: "Local RTC time", example: "2026-06-10 14:32:01" }
        ntpSynced: { type: boolean, example: true }
        quiet:     { type: boolean, description: "true if quiet time is on (flaps do not move for display updates)", example: false }
        minheap:   { type: integer, description: "Minimum free heap ever observed (bytes)", example: 98000 }
        stk:
          type: object
          description: >-
            Per-task minimum-ever free stack in bytes (stack high-water marks).
            The first key was `rs485` (to v1.19), then `bus` (v1.20–v1.21); it is
            `frames` since v1.22.0.
          properties:
            frames: { type: integer, example: 3100 }
            web:  { type: integer, example: 5200 }
            net:  { type: integer, example: 2900 }
            ota:  { type: integer, example: 2400 }
            rtc:  { type: integer, example: 900 }
            disp: { type: integer, example: 1800 }
        panel:
          type: object
          description: "The HUB75 panel and the wall drawn on it"
          properties:
            ok:    { type: boolean, description: "true when the panel driver is running", example: true }
            w:     { type: integer, description: "Panel width in px", example: 128 }
            h:     { type: integer, description: "Panel height in px", example: 32 }
            cols:  { type: integer, description: "Wall columns actually drawn", example: 15 }
            rows:  { type: integer, description: "Wall rows actually drawn", example: 3 }
            cellW: { type: integer, description: "Cell width in px", example: 8 }
            cellH: { type: integer, description: "Cell height in px", example: 10 }
            depth: { type: integer, description: "Effective colour bit depth (may be auto-clamped to fit RAM)", example: 4 }
            font:  { type: string,  description: "The face the wall is rendered with", example: "6x10" }
            vmods: { type: integer, description: "Virtual modules on the wall", example: 45 }
        companion:
          type: object
          description: "The registered companion app (v3.0)"
          properties:
            url:    { type: string,  example: "http://192.168.1.60:8000" }
            status: { type: string,  example: "Running: Weather" }
            age:    { type: integer, description: "Seconds since the companion last checked in; -1 = never / deregistered", example: 12 }

    Config:
      type: object
      properties:
        version:      { type: string,  example: "3.1.0", description: "The gateway API level, NOT this firmware's version — the companion parses MAJOR.MINOR out of it and gates its features on >= 3.1. `product` and `fwVersion` are what tell the firmwares apart. Absent on pre-3.1 gateways" }
        product:      { type: string,  example: "Matrix Portal Gateway" }
        fwVersion:    { type: string,  example: "2.0.0", description: "This firmware's own version" }
        wSSID:        { type: string,  example: "MyNetwork" }
        mqHost:       { type: string,  example: "192.168.1.50" }
        mqPort:       { type: integer, example: 1883 }
        mqUser:       { type: string,  example: "" }
        mqPfx:        { type: string,  example: "splitflap" }
        posixTZ:      { type: string,  example: "EST5EDT,M3.2.0,M11.1.0" }
        ntpServer:    { type: string,  example: "pool.ntp.org" }
        gridRows:     { type: integer, example: 3,  description: "Display wall rows" }
        gridCols:     { type: integer, example: 15, description: "Display wall columns" }
        serialDebug:  { type: boolean, example: false }
        haEnabled:    { type: boolean, description: "true if Home Assistant MQTT discovery is enabled", example: false }
        otaPasswordSet: { type: boolean, description: "true if an OTA password is configured", example: false }
        hostname:     { type: string,  description: "The effective hostname (mDNS + AP SSID) — MAC-derived when not pinned", example: "matrix-gw-3f2a" }
        hostnameAuto: { type: boolean, description: "true when the hostname is derived from the MAC rather than pinned", example: true }
        panelW:        { type: integer, description: "Panel chain width in px", example: 128 }
        panelH:        { type: integer, description: "Panel height in px", example: 32 }
        panelBitDepth: { type: integer, description: "Configured colour bitplanes (1–6)", example: 4 }
        panelBGR:      { type: boolean, description: "Panel is wired BGR rather than RGB", example: false }
        panelBright:   { type: integer, description: "Panel brightness 1–255", example: 160 }
        flapMs:        { type: integer, description: "ms per flap of the flip animation", example: 60 }
        flapMax:       { type: integer, description: "Max flips per character change", example: 64 }
        maxFlaps:      { type: integer, description: "Flaps on the drawn reel: glyphs + colours + lowercase + pictographs", example: 237 }
