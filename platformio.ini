; ============================================================================
;  Matrix Portal Gateway -- PlatformIO project
;  Target: Adafruit MatrixPortal ESP32-S3 (product 5778) + a HUB75 RGB matrix
;
;  A port of the Split-Flap Gateway that emulates the split-flap modules on the
;  LED panel instead of driving them over RS-485.
;
;  Board facts that drive the settings below:
;    * 8 MB flash, 2 MB *quad* (not octal) PSRAM -> memory_type = qio_qspi.
;      Quad PSRAM is why GPIO 35/36/37 are free for the HUB75 D/B/B2 lines, and
;      why the panel framebuffer must stay in internal SRAM (quad PSRAM is far
;      too slow to feed a display).
;    * No battery-backed RTC. Wall-clock time comes from NTP; see src/rtc.cpp.
;    * USB CDC on boot, so the serial monitor is the native USB port.
;
;  Build:   pio run
;  Upload:  pio run -t upload      (double-tap RESET first if the port is busy)
;  Monitor: pio device monitor
;  Fonts:   python3 tools/genfont.py   (regenerates src/font1252.cpp)
;
;  WARNING: `pio pkg install` REWRITES this file -- it strips every comment below
;  and has been observed to mangle keys. Let `pio run` resolve lib_deps, and edit
;  lib_deps by hand.
; ============================================================================

[env:matrixportal_s3]
; Arduino-ESP32 core 3.x (the firmware requires "ESP32 Arduino core >= 3.0").
; Uses the pioarduino platform fork, which tracks the modern Arduino-ESP32 3.x core.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = adafruit_matrixportal_esp32s3
framework = arduino

; ---- Clock / flash / PSRAM ----
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
board_build.arduino.memory_type = qio_qspi   ; QIO flash + QUAD PSRAM (board default)

; ---- Partition table ----
; The board's own scheme: 2 MB app0 + 2 MB app1 (so ArduinoOTA and the browser
; uploader both work), a 256 KB uf2 factory slot at 0x410000, and a 3776 KB FATFS
; partition. Do NOT swap in a generic 8 MB table: the board manifest flashes
; tinyuf2.bin at 0x410000, which lands inside app1 on most of them -- and losing
; tinyuf2 costs you the double-tap-reset UF2 bootloader.
board_build.partitions = tinyuf2-partitions-8MB.csv
board_build.filesystem = fatfs          ; firmware uses FFat for runtime persistence

; ---- Compile-time macros ----
; The board manifest already sets ARDUINO_ADAFRUIT_MATRIXPORTAL_ESP32S3,
; BOARD_HAS_PSRAM, ARDUINO_USB_CDC_ON_BOOT=1 and the core assignments; only the
; debug level is worth pinning here.
; CORE_DEBUG_LEVEL 0 for shipping. Temporarily raise to 3 (ERROR) to diagnose a
; network fault: every failure path in NetworkClient::connect() -- socket(),
; connect(), select() timeout, SO_ERROR -- then reports its errno via log_e()/log_i(),
; which is the only way to tell a wedged socket from an unreachable host from an
; exhausted fd table apart. At level 0 they compile away and PubSubClient's bare
; "rc=-2" is all you get.
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MODE=1
    -Wall
    -Wunused-function

; ---- Upload ----
; The MatrixPortal S3 enumerates as a native-USB CDC port and PlatformIO drives
; the 1200 bps touch to enter the bootloader, so auto-detection is the norm. If
; you have several boards attached, uncomment and pin the port.
upload_protocol = esptool
upload_speed = 921600
; upload_port = /dev/cu.usbmodem101

; ---- Serial monitor (firmware calls Serial.begin(115200) over USB CDC) ----
monitor_speed = 115200
; monitor_port = /dev/cu.usbmodem101

; ---- Libraries ----
; The HUB75 panel has no library: src/panel.cpp drives LCD_CAM + GDMA directly. Only
; PubSubClient and ArduinoJson are inherited from the Split-Flap Gateway.
;
; We went through Adafruit Protomatter and then ESP32-HUB75-MatrixPanel-DMA before
; writing our own. Four findings worth not relearning:
;   * Protomatter's ESP32-S3 backend DMAs only the six RGB data lines. LAT, OE and the
;     address lines are bit-banged from a timer ISR, once per row per bitplane. That ISR
;     is the shimmer: WiFi, a flash write or a cache miss delays it and the OE window
;     wanders. panel.cpp puts all thirteen signals in the DMA word, so there is no ISR.
;   * Protomatter also has no brightness control, so dimming was a multiply into every
;     colour -- at four bitplanes that quantized dim colours onto the shortest BCM pulse.
;     panel.cpp dims with the OE duty cycle instead, which costs no colour levels.
;   * A separate flicker was ours: the GFX canvas and the virtual-module array were both
;     landing in this board's quad PSRAM, stalling the core the refresh ran on. panel.cpp
;     allocates MALLOC_CAP_DMA (internal by definition); vmodule.cpp pins its own array.
;   * ESP32-HUB75-MatrixPanel-DMA silently corrupts colour whenever the runtime colour
;     depth differs from the compile-time PIXEL_COLOR_DEPTH_BITS: its DMA writers read
;     the low bits of an 8-bit gamma value, which rendered green as blue.
;
; lib_ldf_mode = chain keeps the LDF from dragging in libraries that a dependency merely
; declares in library.properties but never includes.
lib_ldf_mode = chain
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7
