; ============================================================================
;  Matrix Portal Gateway -- PlatformIO project
;  Target: Waveshare ESP32-S3-RGB-Matrix driver board + a HUB75 RGB matrix
;
;  (Ported from the Adafruit MatrixPortal S3 at v1.25.0 -- that final version
;  lives on the `matrixportal` git branch if the old board ever returns.)
;
;  Board facts that drive the settings below:
;    * ESP32-S3 with 32 MB OCTAL flash at 1.8 V (esptool eFuse: "octal (8 data
;      lines)") and 16 MB octal PSRAM -> memory_type = opi_opi.
;    * Octal PSRAM consumes GPIO 33-37, which is why this board's HUB75 header
;      uses a completely different pin map than the MatrixPortal (common.h).
;    * Battery-backed PCF85063 RTC on I2C (SDA=47, SCL=48) -- wall-clock time
;      survives power cycles once a cell is fitted; NTP still disciplines it.
;    * No UF2 bootloader: recovery is hold-BOOT + esptool, not double-tap-reset.
;    * USB CDC on boot (ARDUINO_USB_CDC_ON_BOOT below): the serial monitor is
;      the native USB port.
;
;  Build:   pio run
;  Upload:  pio run -t upload
;  Monitor: pio device monitor
;  Fonts:   python3 tools/genfont.py   (regenerates src/font1252.cpp)
;
;  WARNING: `pio pkg install` REWRITES this file -- it strips every comment
;  and has been observed to mangle keys. Let `pio run` resolve lib_deps, and
;  edit lib_deps by hand.
; ============================================================================

[env:waveshare_matrix]
; Waveshare ESP32-S3-RGB-Matrix (ESP32-S3 module: 32 MB OCTAL flash at 1.8 V --
; esptool eFuse readout confirms "octal (8 data lines)" -- and 16 MB octal PSRAM,
; so memory_type is opi_opi, NOT the MatrixPortal's qio_qspi). Octal PSRAM is
; also why this board's HUB75 header uses different GPIOs: the PSRAM consumes
; GPIO 33-37, which the MatrixPortal map used for D/B/B2.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

board_build.f_cpu = 240000000L
board_build.flash_mode = opi
board_build.f_flash = 80000000L
board_upload.flash_size = 32MB
board_upload.maximum_size = 33554432
board_build.arduino.memory_type = opi_opi
board_build.partitions = partitions-32MB.csv
board_build.filesystem = fatfs

; v3.3.0: recompile the Arduino core (pioarduino custom_sdkconfig) with WiFi/lwIP
; buffers allocated from PSRAM (SPIRAM_TRY_ALLOCATE_WIFI_LWIP). WHY: every deep heap
; trough in this project's history is network ingest/egress stacking in INTERNAL-heap
; buffers on a board whose panel framebuffer leaves ~68 KB free. Measured nulls first:
; shrinking WIFI_DYNAMIC_RX_BUFFER_NUM/TCPIP_RECVMBOX changed nothing (troughs live
; elsewhere), and the WiFi IRAM opts are ALREADY off in the stock Arduino core (that
; ~30 KB was spent before we started). Moving the buffer pools to PSRAM is the
; structural fix; the watched risk is PSRAM bus contention with the panel GDMA.
; The FMB lines are not tuning -- the bundled esp-modbus component (unused here) has
; hybrid-recompile defaults that violate its own static assert; they satisfy it.
; REVERT: delete this block, remove .pio/build + managed_components + sdkconfig.*,
; and reinstall the libs package (pio pkg uninstall/install) to restore prebuilt stock.
custom_sdkconfig =
    CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP=y
    CONFIG_FMB_MASTER_TIMEOUT_MS_RESPOND=150
    CONFIG_FMB_MASTER_MAX_API_BLOCKING_TIME_MS=1000

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_WAVESHARE_MATRIX=1
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; Warnings apply to THIS project's sources only (build_src_flags = src/). They used to sit
; in build_flags, which also compiled every library under -Wall -- fine until AnimatedGIF
; (v2.2), whose gif.inl declares a static function it never defines. We hold our own code
; to zero warnings; we cannot hold bitbank2's to it.
build_src_flags =
    -Wall
    -Wunused-function

upload_protocol = esptool
upload_speed = 921600
monitor_speed = 115200

lib_ldf_mode = chain
lib_deps =
    bblanchon/ArduinoJson @ ^7
    bitbank2/AnimatedGIF @ ^2.2.0
